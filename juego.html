<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="LogoUriel.png">
    <title>Juego|Juego del Basta o Stop</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(90deg, #f5eb97, #d0ebb5, #abead3);
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 24px 16px 40px;
        }

        .panel-principal {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            width: 100%;
        }

        .ruleta {
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: #2456d4;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ruleta2 {
            position: relative;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: #d62828;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        .ruleta3 {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #ececec;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 5;
        }

        #temporizador {
            font-size: 42px;
            font-weight: bold;
            color: #0f372f;
        }

        #btnIniciar {
            padding: 8px 18px;
            border: none;
            border-radius: 20px;
            background: #0f372f;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: .2s;
        }

        #btnIniciar:hover {
            transform: scale(1.08);
        }

        .letra-btn {
            position: absolute;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: #103b32;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translate(-50%, -50%);
            transition: .25s;
        }

        .letra-btn:hover {
            transform: translate(-50%, -50%) scale(1.12);
        }

        .deshabilitada {
            opacity: .35;
            pointer-events: none;
        }

        .boton-reiniciar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 18px auto 0;
            padding: 12px 20px;
            border-radius: 999px;
            background: #0f5739;
            color: #fff;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(15, 87, 57, 0.14);
        }

        .boton-reiniciar:hover {
            background: #0d4a31;
        }

        .second-panel {
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .25);
            max-width: 220px;
            width: 100%;
        }

        .second-panel input,
        .second-panel select {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, .15);
            margin-bottom: 10px;
        }

        .second-panel select {
            min-height: 120px;
        }

        .contenedor-ruleta {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .p {
            color: #fff;
            font-size: 14px;
        }

        .botones{
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }


        .footer {
            background-color: #000000;
            width: 100%;
            height: auto;
            padding: 10px;
            text-align: center;
            margin-top: 20px;
            bottom: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="panel-principal">
            <div class="second-panel">
                <input id="categoria" type="text" placeholder="Ingrese una categoría" />
                <button class="boton-reiniciar" onclick="agregarCategoria()">Agregar</button>
                <br>
                <br>
                <select id="historial" size="auto"></select>
            </div>

            <div class="ruleta">
                <div id="ruleta2" class="ruleta2">
                    <div class="ruleta3">
                        <span id="temporizador">30</span>
                        <button id="btnIniciar">Iniciar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="botones">

            <button id="reiniciarBtn" class="boton-reiniciar">Reiniciar Juego</button>
            <button class="boton-reiniciar" onclick="window.location.href='Index.html'">Ir a Inicio</button>
            
        </div><!--botones-->
    </div>

    <footer class="footer">
        <p class="p">© 2026 Gestionador de Mensajes. Todos los derechos reservados. La Doble U.</p>
    </footer>

    <script>
        const historialCategorias = [];
        const ruleta = document.getElementById("ruleta2");
        const letras = [
            "A", "B", "C", "D", "E", "F", "G",
            "H", "I", "J", "L", "M", "N", "Ñ",
            "O", "P", "Q", "R", "S", "T", "U",
            "V", "Z"
        ];
        const radio = 150;
        const centro = 175;
        const tiempoInicial = 30;

        let tiempo = tiempoInicial;
        let jugando = false;
        let temporizador = null;

        const reloj = document.getElementById("temporizador");
        const btnIniciar = document.getElementById("btnIniciar");
        const reiniciarBtn = document.getElementById("reiniciarBtn");
        const categoriaInput = document.getElementById("categoria");

        reloj.textContent = tiempo;

        function agregarCategoria() {
            const input = document.getElementById("categoria");
            const categoria = input.value.trim();

            if (categoria === "") return;

            if (!historialCategorias.includes(categoria)) {
                historialCategorias.push(categoria);
                actualizarHistorial();
            }

            input.value = "";
        }

        function actualizarHistorial() {
            const select = document.getElementById("historial");
            select.innerHTML = "";

            historialCategorias.forEach((categoria) => {
                const opcion = document.createElement("option");
                opcion.textContent = categoria;
                select.appendChild(opcion);
            });
        }

        function crearRuleta() {
            letras.forEach((letra, i) => {
                const boton = document.createElement("button");
                boton.className = "letra-btn";
                boton.textContent = letra;

                const angulo = (2 * Math.PI * i) / letras.length - Math.PI / 2;
                const x = centro + radio * Math.cos(angulo);
                const y = centro + radio * Math.sin(angulo);

                boton.style.left = `${x}px`;
                boton.style.top = `${y}px`;

                boton.addEventListener("click", () => {
                    if (!jugando) return;

                    boton.classList.add("deshabilitada");
                    iniciarTemporizador();
                });

                ruleta.appendChild(boton);
            });
        }

        function reiniciarLetras() {
            document.querySelectorAll(".letra-btn").forEach((btn) => {
                btn.classList.remove("deshabilitada");
            });
        }

        function iniciarTemporizador() {
            clearInterval(temporizador);
            tiempo = tiempoInicial;
            reloj.textContent = tiempo;

            temporizador = setInterval(() => {
                tiempo--;
                reloj.textContent = tiempo;

                if (tiempo <= 0) {
                    clearInterval(temporizador);
                    jugando = false;
                    btnIniciar.disabled = false;
                    btnIniciar.textContent = "Iniciar";
                    alert("¡Tiempo terminado!");
                }
            }, 1000);
        }

        function iniciarJuego() {
            jugando = true;
            btnIniciar.disabled = true;
            btnIniciar.textContent = "Jugando";
            iniciarTemporizador();
        }

        function reiniciarJuego() {
            clearInterval(temporizador);
            reiniciarLetras();
            tiempo = tiempoInicial;
            jugando = false;
            reloj.textContent = tiempo;
            btnIniciar.disabled = false;
            btnIniciar.textContent = "Iniciar";
        }

        btnIniciar.addEventListener("click", iniciarJuego);
        reiniciarBtn.addEventListener("click", reiniciarJuego);

        if (categoriaInput) {
            categoriaInput.addEventListener("keydown", (event) => {
                if (event.key === "Enter") {
                    event.preventDefault();
                    agregarCategoria();
                }
            });
        }

        crearRuleta();
    </script>
</body>

</html>
